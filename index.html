<style>

  .tier.avoid{background:#2a1717;border-color:#5e2f2f}

  .tier .cnt{color:var(--dim);font-weight:400}
  .row{display:flex;justify-content:space-between;padding:9px 8px;border-radius:9px;
    background:var(--card2);margin-bottom:6px;font-size:15px;align-items:center}
  .row .code{font-weight:700;letter-spacing:.4px}
  .row .sc{font-variant-numeric:tabular-nums;color:var(--dim)}
  .row.pos .sc{color:var(--grn)} .row.neg .sc{color:var(--red)}
  .rl{display:flex;gap:6px;margin-right:auto;min-width:0}
  .rl .nm{color:var(--txt);font-size:14px;max-width:84px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .pr{font-variant-numeric:tabular-nums;margin-left:auto;margin-right:8px;min-width:50px;text-align:right;color:var(--dim)}

  .row .ch.up{color:var(--red)} .row .ch.dn{color:var(--grn)}

    font-size:15px;font-weight:700;box-shadow:0 6px 20px rgba(0,0,0,.5)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 6px;text-align:right;border-bottom:1px solid var(--line)}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:600}
  .tag{font-size:10px;padding:0 6px;border-radius:6px;background:#2f4f5e;color:#bfe;margin-left:4px}
  .empty{color:var(--dim);text-align:center;padding:30px}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid #062224;border-top-color:transparent;
    border-radius:50%;animation:r .7s linear infinite;vertical-align:-2px;margin-right:6px}
  @keyframes r{to{transform:rotate(360deg)}}
  .foot{flex:0 0 auto;height:56px;padding-bottom:env(safe-area-inset-bottom);background:var(--bg);

  .foot .tab{flex:1;text-align:center;padding:8px 2px;color:var(--dim);font-size:12px}
  .foot .tab.on{color:var(--acc)}
  .foot .tab .ic{font-size:18px;display:block;line-height:1.3}
  .note{color:var(--dim);font-size:12px;margin-top:10px}

const $=s=>document.querySelector(s);
function show(v){document.querySelectorAll('.view').forEach(e=>e.classList.toggle('on',e.id==='v_'+v));
  document.querySelectorAll('#foot .tab').forEach(e=>e.classList.toggle('on',e.dataset.v===v));
  const m=document.querySelector('.main');if(m)m.scrollTop=0;}
document.getElementById('foot').addEventListener('click',e=>{const t=e.target.closest('.tab');if(t)show(t.dataset.v);});
function fmtSc(x){return (x>=0?'+':'')+x.toFixed(3);}
function rowHTML(o){
  const cls=(o.score>=0?'pos':'neg');
  return '<div class="row '+cls+'" data-code="'+o.code+'"><div class="rl"><span class="nm"></span><span class="code">'+o.code+'</span></div><span class="sc">'+fmtSc(o.score)+'</span><span class="pr">-</span><span class="ch"></span></div>';
}
function renderTier(el,list,filter){
  if(!list||!list.length){el.innerHTML='<div class="empty">无</div>';return;}
  const f=filter?filter.toLowerCase():'';
  const fl=list.filter(o=>o.code.toLowerCase().includes(f));
  el.innerHTML=fl.length?fl.map(rowHTML).join(''):'<div class="empty">无匹配</div>';
}
function paintSignal(s){
  $('#c_core').textContent=s.buy_core.length;
  $('#c_swing').textContent=s.buy_swing.length;
  $('#c_avoid').textContent=s.avoid.length;
  renderTier($('#core'),s.buy_core,$('#q').value);
  renderTier($('#swing'),s.buy_swing,$('#q').value);
  renderTier($('#avoid'),s.avoid,$('#q').value);
  $('#upd').textContent='信号 '+ (s.time||'').replace('T',' ').slice(0,16) +' · 覆盖'+(s.n_universe||'?');
}
async function loadSignal(){
  if(INIT&&INIT.signal){paintSignal(INIT.signal);return;}
  try{const r=await fetch('/api/signal');const j=await r.json();
    if(!j.ok||!j.signal){$('#core').innerHTML='<div class="empty">尚无信号</div>';return;}
    paintSignal(j.signal);}catch(e){console.error(e);}
}
$('#q').oninput=()=>{const s=(INIT&&INIT.signal);if(s)paintSignal(s);};
function paintStatus(s){
    const au=s.data&&s.data.authenticity;
    const b=$('#auth');
    if(au&&au.status==='verified_real'){b.textContent='数据已核验·真实';b.className='badge ok';}
    else{b.textContent='数据未核验';b.className='badge warn';}
    const t=s.training;let h='<h2>① V21 全量训练</h2>';
    if(!t.found){h+='<div class="kv"><span class="k">状态</span><span class="v" style="color:var(--red)">未启动/无日志</span></div>';}
    else{
      h+='<div class="kv"><span class="k">状态</span><span class="v">'+t.state+'</span></div>';
      if(t.epoch!=null)h+='<div class="kv"><span class="k">进度</span><span class="v">ep'+t.epoch+'/'+t.total_epochs+'</span></div>';
      if(t.total_stocks)h+='<div class="kv"><span class="k">规模</span><span class="v">'+t.total_stocks+' 只 · '+(t.params?t.params.toLocaleString():'')+' 参数</span></div>';
      if(t.train_loss!=null)h+='<div class="kv"><span class="k">当前 loss</span><span class="v">train '+t.train_loss.toFixed(5)+' / val '+(t.val_loss!=null?t.val_loss.toFixed(5):'?')+'</span></div>';
      if(t.best_val!=null&&t.best_val!==Infinity)h+='<div class="kv"><span class="k">最佳 val</span><span class="v">'+t.best_val.toFixed(5)+'</span></div>';
      if(t.restarts>1)h+='<div class="kv"><span class="k">守护重启</span><span class="v">'+(t.restarts-1)+' 次</span></div>';
      if(t.early_stop)h+='<div class="kv"><span class="k">早停</span><span class="v" style="color:var(--ylw)">已触发</span></div>';
    }
    $('#train_card').innerHTML=h;
    const m=s.model;let mh='<h2>② 模型 / 数据</h2>';
    mh+='<div class="kv"><span class="k">冠军</span><span class="v">'+(m.champion.run||'?')+'</span></div>';
    if(m.champion.sharpe_20d!=null)mh+='<div class="kv"><span class="k">对冲夏普(20d)</span><span class="v">'+m.champion.sharpe_20d+'</span></div>';
    const p=m.production||{};
    mh+='<div class="kv"><span class="k">生产状态</span><span class="v">'+(p.status||'?')+'</span></div>';
    const d=s.data||{};
    mh+='<div class="kv"><span class="k">行业词表</span><span class="v">'+(d.industry_vocab||'?')+' 条</span></div>';
    mh+='<div class="kv"><span class="k">训练缓存</span><span class="v">'+(d.cache_stocks||'?')+' 只</span></div>';
    mh+='<div class="kv"><span class="k">标签覆盖</span><span class="v">'+(d.label_cov||'?')+'/'+(d.cache_stocks||'?')+' = '+(d.label_pct||'?')+'%</span></div>';
    const au2=d.authenticity||{};
    mh+='<div class="kv"><span class="k">缓存截止</span><span class="v">'+(au2.cache_until||'?')+'</span></div>';
    if(m.checkpoints&&m.checkpoints.length){
      mh+='<div style="margin-top:8px"></div>';
      m.checkpoints.slice(0,6).forEach(c=>{mh+='<div class="kv"><span class="k">'+c.name+'</span><span class="v">'+c.size_mb+' MB</span></div>';});
    }
    $('#model_card').innerHTML=mh;
    $('#upd').textContent=($('#upd').textContent||'')+' · 看板 '+s.generated_at;
}
async function loadStatus(){
  if(INIT&&INIT.status){paintStatus(INIT.status);return;}
  try{const r=await fetch('/api/status');const s=await r.json();paintStatus(s);}catch(e){console.error(e);}
}
function paintPerf(j){
    const rows=j.rows||[];
    let h='<table><thead><tr><th>分档</th><th>持有</th><th>净年化</th><th>净夏普</th><th>胜率</th><th>回撤</th></tr></thead><tbody>';
    rows.forEach(rw=>{h+='<tr><td>top'+(rw.frac*100)+'%'+(rw.tag?'<span class="tag">'+rw.tag+'</span>':'')+'</td><td>'+rw.hold+'d</td><td>'+(rw.net_ann*100).toFixed(1)+'%</td><td>'+rw.net_sharpe.toFixed(2)+'</td><td>'+(rw.win_rate*100).toFixed(0)+'%</td><td style="color:var(--red)">'+(rw.max_dd*100).toFixed(0)+'%</td></tr>';});
    h+='</tbody></table>';
    h+='<div class="note">验证窗口(~51交易日)外推年化，方差大，非多年实盘业绩；纯多头无对冲，回撤显著。</div>';
    $('#perf').innerHTML=h;
}
async function loadPerf(){
  if(INIT&&INIT.perf){paintPerf(INIT.perf);return;}
  try{const r=await fetch('/api/perf');const j=await r.json();paintPerf(j);}catch(e){console.error(e);}
}
async function fetchRealtime(){
  const els = document.querySelectorAll('[data-code]');
  const codes = [...new Set(Array.from(els).map(el=>el.getAttribute('data-code')))];
  if(!codes.length) return;
  const batchSize = 150;
  for(let i=0;i<codes.length;i+=batchSize){
    const batch = codes.slice(i,i+batchSize).map(c=>(c.startsWith('SH')?'sh':'sz')+c.slice(2)).join(',');
    try{
      const r = await fetch('https://qt.gtimg.cn/q='+batch);
      const buf = await r.arrayBuffer();
      const text = new TextDecoder('gbk').decode(buf);
      text.split('\n').forEach(line=>{
        const m=line.match(/^v_([a-z0-9]+)="(.+)";?$/); if(!m) return;
        const val=m[2].split('~'); const fc=(m[1].startsWith('sh')?'SH':'SZ')+m[1].slice(2);
        const el=document.querySelector('[data-code="'+fc+'"]'); if(!el) return;
        const nm=el.querySelector('.nm'); if(nm) nm.textContent=val[1];
        const p=el.querySelector('.pr'); const c=el.querySelector('.ch');
        if(p) p.textContent=val[3];
        if(c){const pc=parseFloat((val[32]||'').trim());if(!isNaN(pc)){c.textContent=(pc>=0?'+':'')+pc.toFixed(2)+'%';c.className='ch '+(pc>0?'up':(pc<0?'dn':''));}}
      });
    }catch(e){}
  }
}
if(!INIT){
  $('#refresh').onclick=async()=>{
    const btn=$('#refresh');btn.disabled=true;btn.innerHTML='<span class="spin"></span>刷新中…';
    try{await fetch('/api/refresh',{method:'POST'});await loadSignal();}catch(e){}
    btn.disabled=false;btn.innerHTML='↻ 刷新信号';
  };
  setInterval(loadStatus,30000);
}else{
  const rb=$('#refresh');rb.disabled=true;rb.textContent='↻ 静态版·重新导出更新';
}
loadSignal();loadStatus();loadPerf();fetchRealtime();
setInterval(fetchRealtime,30000);
