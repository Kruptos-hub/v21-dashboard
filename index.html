<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KrupstockSys · 我的持仓</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --line:#2a3340;
    --txt:#e6edf3; --dim:#8b949e; --grn:#3fb950; --red:#f85149;
    --ylw:#d29922; --blue:#58a6ff; --cyn:#39c5cf; --gold:#e3b341;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
       font-size:14px;line-height:1.5;padding:12px 14px 60px;max-width:960px;margin:0 auto}
  /* ── 顶部：资产条 ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
          padding:10px 14px;background:var(--panel);border:1px solid var(--line);
          border-radius:12px;margin-bottom:12px;min-height:48px}
  .topbar .brand{font-size:15px;font-weight:800;letter-spacing:.5px;white-space:nowrap}
  .topbar .meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--dim);flex-wrap:wrap}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--dim);margin-right:4px;vertical-align:middle}
  .dot.live{background:var(--grn);box-shadow:0 0 6px var(--grn);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .sess{font-weight:700;padding:1px 8px;border-radius:12px;font-size:11px}
  .sess.trade{background:rgba(63,185,80,.15);color:var(--grn)}
  .sess.break{background:rgba(210,153,34,.15);color:var(--ylw)}
  .sess.close{background:rgba(139,148,158,.15);color:var(--dim)}
  /* ── 资产条 ── */
  .asset-bar{display:flex;flex-wrap:wrap;gap:12px 20px;align-items:baseline;
             background:var(--panel);border:1px solid var(--line);border-radius:12px;
             padding:10px 16px;margin-bottom:12px}
  .asset-bar .ab{display:flex;flex-direction:column;min-width:90px}
  .asset-bar .ab .lab{font-size:11px;color:var(--dim);text-transform:uppercase}
  .asset-bar .ab .num{font-size:20px;font-weight:800;letter-spacing:.5px}
  .asset-bar .ab .num.big{font-size:26px}
  .pos{color:var(--red)} .neg{color:var(--grn)} .neu{color:var(--dim)}
  .up{color:var(--red)} .dn{color:var(--grn)}
  /* ── 单股聚焦卡 ── */
  .focus-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
              padding:16px 18px;margin-bottom:12px}
  .focus-card .fc-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
  .focus-card .fc-name{font-size:13px;color:var(--dim);margin-bottom:2px}
  .focus-card .fc-name b{color:var(--txt);font-size:16px}
  .focus-card .fc-price{font-size:36px;font-weight:800;letter-spacing:1px;line-height:1.1}
  .focus-card .fc-change{font-size:16px;font-weight:700;margin-left:4px}
  .focus-card .fc-detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px 14px;
                          margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .focus-card .fc-detail .fd{display:flex;flex-direction:column}
  .focus-card .fd .lab{font-size:11px;color:var(--dim)}
  .focus-card .fd .val{font-size:17px;font-weight:700}
  .focus-card .fd .sub{font-size:12px}
  /* ── 通用 panel ── */
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 16px;margin-bottom:10px}
  .panel h2{font-size:13px;color:var(--dim);font-weight:700;margin-bottom:10px;
            display:flex;align-items:center;gap:6px}
  .panel h2 .tag{font-size:11px;font-weight:500}
  /* ── 指令 / IPO 网格 ── */
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .card.pending{border-color:rgba(248,81,73,.5)}
  .card .hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .card .ttl{font-weight:800;font-size:14px}
  .card .row{display:flex;justify-content:space-between;font-size:12px;margin:2px 0}
  .card .row span:first-child{color:var(--dim)}
  .card .rsn{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.4}
  .pill{display:inline-block;padding:1px 7px;border-radius:8px;font-size:10px;font-weight:700}
  .pill.loss{background:rgba(248,81,73,.15);color:var(--red)}
  .pill.swing{background:rgba(210,153,34,.15);color:var(--ylw)}
  .pill.add{background:rgba(63,185,80,.15);color:var(--grn)}
  .pill.hold{background:rgba(88,166,255,.15);color:var(--blue)}
  .pill.pending{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.4)}
  .pill.done{background:rgba(139,148,158,.15);color:var(--dim)}
  .pill.ipo{background:rgba(227,179,65,.12);color:var(--gold)}
  /* ── 底部栏 ── */
  .idx-line{display:flex;gap:16px;flex-wrap:wrap;align-items:baseline;
            background:var(--panel);border:1px solid var(--line);border-radius:12px;
            padding:8px 16px;margin-bottom:10px}
  .idx-line .it{display:flex;align-items:baseline;gap:6px}
  .idx-line .nm{font-size:11px;color:var(--dim)}
  .idx-line .pr{font-size:15px;font-weight:800}
  .idx-line .ch{font-size:11px}
  .train-bar{display:flex;gap:14px;align-items:center;flex-wrap:wrap;font-size:11px;
             background:var(--panel);border:1px solid var(--line);border-radius:12px;
             padding:7px 14px;color:var(--dim);margin-bottom:8px}
  .train-bar b{color:var(--txt)}
  .badge{font-size:10px;padding:1px 7px;border-radius:8px;font-weight:700}
  .badge.on{background:rgba(63,185,80,.15);color:var(--grn)}
  .badge.off{background:rgba(248,81,73,.15);color:var(--red)}
  .foot{color:var(--dim);font-size:10px;text-align:center;line-height:1.5}
  .err{color:var(--red);font-size:11px}
  .upd{font-size:10px;color:var(--dim);text-align:right}
</style>
</head>

function fmt(n, d=2){ if(n===null||n===undefined||isNaN(n)) return "—"; return Number(n).toLocaleString("zh-CN",{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtSigned(n, d=2){ if(n===null||n===undefined||isNaN(n)) return "—"; return (n>=0?"+":"") + fmt(n,d); }
function cls(n){ return n>0?"pos":(n<0?"neg":"neu"); }
function clsPct(n){ return n>0?"up":(n<0?"dn":"flat"); }

function beijingNow(){
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  return new Date(utc + 8*3600*1000);
}
function sessionInfo(bj){
  const day = bj.getDay();
  const hm = bj.getHours()*60 + bj.getMinutes();
  const morning = hm>=570 && hm<690;
  const afternoon = hm>=780 && hm<900;
  const trading = (day>=1 && day<=5) && (morning || afternoon);
  const lunch = (day>=1 && day<=5) && (hm>=690 && hm<780);
  let label, clsName, interval;
  if(trading){ label="交易中"; clsName="trade"; interval=3000; }
  else if(lunch){ label="午间休市"; clsName="break"; interval=30000; }
  else { label="已收盘"; clsName="close"; interval=30000; }
  return {label, clsName, interval, trading};
}

function renderMeta(){
  const bj = beijingNow();
  document.getElementById("bjTime").textContent = "北京 " + bj.toLocaleTimeString("zh-CN",{hour12:false});
  const s = sessionInfo(bj);
  document.getElementById("sessDot").className = "dot" + (s.trading?" live":"");
  const st = document.getElementById("sessTxt"); st.textContent = s.label; st.className = "sess "+s.clsName;
  return s;
}

/* ── 单股聚焦 ── */
function renderFocus(pos, ipoVal){
  const card = document.getElementById("focusCard");
  if(!pos||!pos.length){ card.innerHTML='<div style="color:var(--dim)">暂无持仓</div>'; return; }
  // 取第一只（主仓）；有多个则额外展示
  const p = pos[0];
  const pnlCls = cls(p.pnl), dayCls = cls(p.today_pnl);
  const changeCls = clsPct(p.change_pct);
  const err = p.error ? `<div class="err">${p.error}</div>` : "";
  card.innerHTML = `
    <div class="fc-top">
      <div>
        <div class="fc-name"><b>${p.name}</b> ${p.code} · ${p.time||""}</div>
        <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
          <span class="fc-price ${changeCls}">${fmt(p.price)}</span>
          <span class="fc-change ${cls(p.change)}">${fmtSigned(p.change)} ${fmtSigned(p.change_pct)}%</span>
        </div>
        ${err}
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--dim)">市值</div>
        <div style="font-size:22px;font-weight:800">${fmt(p.market_value)}</div>
      </div>
    </div>
    <div class="fc-detail">
      <div class="fd"><span class="lab">持仓</span><span class="val">${fmt(p.shares,0)} 股</span></div>
      <div class="fd"><span class="lab">成本价</span><span class="val">${fmt(p.cost)}</span></div>
      <div class="fd"><span class="lab">累计盈亏</span><span class="val ${pnlCls}">${fmtSigned(p.pnl)}</span><span class="sub ${pnlCls}">${fmtSigned(p.pnl_pct)}%</span></div>
      <div class="fd"><span class="lab">当日盈亏</span><span class="val ${dayCls}">${fmtSigned(p.today_pnl)}</span><span class="sub ${dayCls}">${p.change_pct>0?'+':''}${fmt(p.change_pct)}%</span></div>
      <div class="fd"><span class="lab">最高 / 最低</span><span class="val" style="font-size:14px">${fmt(p.high||0)} / ${fmt(p.low||0)}</span></div>
      <div class="fd"><span class="lab">成交量</span><span class="val" style="font-size:14px">${fmt(p.volume||0,0)} 手</span></div>
    </div>`;
  // 次仓（如果有）
  if(pos.length > 1){
    let extra = '';
    for(let i=1; i<pos.length; i++){
      const q = pos[i];
      extra += `<div style="padding-top:10px;margin-top:10px;border-top:1px solid var(--line);font-size:13px">
        <b>${q.name}</b> ${q.code} · ${fmt(q.shares,0)}股 @ ${fmt(q.cost)} → 现价 ${fmt(q.price)} 市值 ${fmt(q.market_value)} | 盈亏 <span class="${cls(q.pnl)}">${fmtSigned(q.pnl)} (${fmtSigned(q.pnl_pct)}%)</span>
      </div>`;
    }
    card.innerHTML += extra;
  }
}

/* ── 指令 ── */
function renderInstructions(list){
  const box=document.getElementById("instrBox");
  document.getElementById("instrCount").textContent = (list?list.length:0)+" 条";
  box.innerHTML="";
  if(!list||!list.length){ box.innerHTML='<div style="color:var(--dim)">暂无交易指令</div>'; return; }
  const typePill = {"止损":"loss","波段减仓":"swing","减仓":"swing","加仓":"add","止损止盈":"loss"};
  list.forEach(it=>{
    const t = it.type||"指令";
    const pill = typePill[t]||"hold";
    const st = it.status||"";
    const stPill = st==="pending"?"pending":(st==="done"||st==="executed"?"done":"");
    const div=document.createElement("div");
    div.className="card"+(st==="pending"?" pending":"");
    div.innerHTML = `
      <div class="hd"><span class="ttl">${it.name||it.code||''} · ${t}</span>
        ${stPill?`<span class="pill ${stPill}">${st==='pending'?'待执行':'已执行'}</span>`:''}</div>
      <div class="row"><span>触发价</span><b>${fmt(it.price)}</b></div>
      <div class="row"><span>仓位</span><span>${it.target_position||'—'}</span></div>
      <div class="row"><span>操作</span><span>${it.action||'—'}</span></div>
      <div class="row"><span>优先级</span><span>${it.priority||'—'}</span></div>
      ${it.reason?`<div class="rsn">${it.reason}</div>`:''}`;
    box.appendChild(div);
  });
}

/* ── IPO ── */

    const codeLine = it.code ? `<div class="row"><span>代码</span><span>${it.code}</span></div>` : "";
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <div class="hd"><span class="ttl">${it.name||"中签新股"}</span><span class="pill ipo">${it.status||"待上市"}</span></div>
      ${codeLine}<div class="row"><span>中签</span><span>${detail}</span></div>
      <div class="rsn">上市后自动并入持仓并计盈亏</div>`;
    box.appendChild(div);
  });
}

/* ── 大盘一行 ── */
function renderIndices(idx){
  const box=document.getElementById("idxLine");
  const order = [["sh000001","上证"],["sz399001","深证"],["sz399006","创业板"]];
  let html='';
  for(const [c,nm] of order){
    const q = idx[c]; if(!q||q.error) continue;
    html += `<div class="it"><span class="nm">${nm}</span><span class="pr ${clsPct(q.change_pct)}">${fmt(q.price)}</span><span class="ch ${cls(q.change)}">${fmtSigned(q.change)} ${fmtSigned(q.change_pct)}%</span></div>`;
  }
  box.innerHTML = html;
}

/* ── 训练一行 ── */
function renderTraining(t){
  const box=document.getElementById("trainBar");
  if(!t){ box.innerHTML='<span style="color:var(--dim)">训练：—</span>'; return; }
  const on = t.alive;
  let html = `<span class="badge ${on?'on':'off'}">${on?'训练中':'已停'}</span>`;
  if(t.epoch!==null) html += `<span>V22 · ep<b>${t.epoch}</b>${t.step?'/s'+t.step:''}</span>`;
  if(t.best_val!==null) html += `<span>best <b>${Number(t.best_val).toFixed(5)}</b></span>`;
  if(t.ckpt_mtime) html += `<span>@${t.ckpt_mtime}</span>`;
  box.innerHTML = html;
}

/* ── 总渲染 ── */
function renderAll(data){
  if(!data) return;
  const pf = data.portfolio||{};
  const sm = pf.summary||{};
  const pos = pf.positions||[];
  const ipo = pf.ipo||[];
  const ipoVal = sm.ipo_value||0;
  renderAssetBar(sm, pf.cash||0, ipoVal);
  renderFocus(pos, ipoVal);
  renderIPO(ipo);
  renderInstructions(data.instructions||[]);
  renderIndices(data.indices||{});
  renderTraining(data.training||{});
  document.getElementById("updAt").textContent = "更新于 "+(data.updated_at||"");
}

let timer=null;
function tick(){
  const s = renderMeta();
  fetch(API_BASE+"/api/all").then(r=>r.json()).then(d=>{
    document.getElementById("liveDot").className="dot live";
    document.getElementById("liveTxt").textContent = s.trading?"实时刷新中":"休眠轮询";
    renderAll(d);
    if(timer){ clearInterval(timer); }
    timer = setInterval(tick, s.interval);
  }).catch(e=>{
    document.getElementById("liveDot").className="dot";
    document.getElementById("liveTxt").textContent = "离线（静态快照）";
  });
}

// 首屏：先渲染内置快照（即使无服务也可看），随后尝试实时连接
renderMeta();
renderAll(INITIAL);
tick();
setInterval(renderMeta, 1000);
</script>
</body>
</html>
