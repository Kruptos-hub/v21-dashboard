<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache">
<title>KrupstockSys V21</title>
<style>
:root{
  --bg:#080c12;--surface:#0f151c;--card:#141b24;
  --border:#1e2a36;--border-light:#253240;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#5a6570;
  --grn:#3fb950;--red:#f85149;--amber:#d29922;--blue:#58a6ff;--acc:#79c0ff;
  --grn-bg:rgba(63,185,80,.08);--red-bg:rgba(248,81,73,.08);--amber-bg:rgba(210,153,34,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font:14px/1.5 -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;-webkit-font-smoothing:antialiased}

body{display:flex;flex-direction:column;height:100dvh}
.view{display:none}.view.on{display:flex;flex-direction:column;min-height:100%}

/* topbar */
.topbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
  height:40px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar-brand{font-size:15px;font-weight:800;color:var(--txt);white-space:nowrap}
.topbar-mid{display:flex;gap:18px;font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.topbar-right{font-size:12px;color:var(--txt3)}

/* card */
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.card h2{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:8px}
.cnt{font-size:11px;font-weight:400;color:var(--txt3);margin-left:6px}
.note{font-size:11px;color:var(--txt3);margin:4px 0;line-height:1.5}
.empty{color:var(--txt3);text-align:center;padding:24px;font-size:13px}
.alert{background:var(--red-bg);border:1px solid rgba(248,81,73,.2);border-radius:6px;padding:6px 10px;margin:4px 0;font-size:12px}
.info{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.12);border-radius:6px;padding:6px 10px;margin:4px 0;font-size:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* sidebar */
.side{display:none}
@media(min-width:900px){
  body{flex-direction:row;flex-wrap:wrap}
  .topbar{flex-basis:100%}
  .side{display:flex;flex-direction:column;width:190px;flex:0 0 190px;
    background:var(--surface);border-right:1px solid var(--border);padding:8px 6px}
  .side .item{padding:10px 8px;border-radius:6px;font-size:13px;color:var(--txt2);
    cursor:pointer;display:flex;gap:6px;align-items:center;user-select:none}
  .side .item:hover{background:var(--card)}
  .side .item.on{background:var(--card);color:var(--acc);font-weight:600}
  .main{flex:1;height:calc(100dvh - 40px);overflow-y:auto;padding:10px}
}
.main{flex:1 1 auto;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px}

/* pos rows */
.pr{display:flex;flex-direction:column;gap:4px}
.pr .r{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;
  background:var(--surface);border-radius:6px;border-left:2px solid var(--border-light);font-size:13px}
.pr .r .k{color:var(--txt2)}.pr .r .v{font-weight:600;font-variant-numeric:tabular-nums}

/* briefing */
.briefing{font-size:13px;line-height:1.45;flex:1}
.briefing h1{font-size:15px;margin:0 0 4px;font-weight:700}
.briefing h2{font-size:13px;margin:10px 0 3px;color:var(--acc);font-weight:600;border-bottom:1px solid var(--border);padding-bottom:2px;break-inside:avoid}
.briefing h3{font-size:12px;margin:6px 0 3px;font-weight:600;break-inside:avoid}
.briefing p{margin:3px 0;font-size:13px;color:var(--txt2)}
.briefing table{width:100%;border-collapse:collapse;margin:3px 0;font-size:12px;break-inside:avoid}
.briefing td{padding:3px 5px;border-bottom:1px solid rgba(30,42,54,.3)}
.briefing td:first-child{color:var(--txt2);white-space:nowrap}
.briefing td:last-child{text-align:right;font-weight:600;font-variant-numeric:tabular-nums}
.briefing blockquote{margin:4px 0;padding:5px 10px;border-left:2px solid var(--amber);background:var(--amber-bg);border-radius:0 4px 4px 0;font-size:12px;color:var(--amber);break-inside:avoid}
.briefing ul{padding-left:16px;margin:3px 0;break-inside:avoid}.briefing li{margin:3px 0;font-size:13px;line-height:1.45}
.briefing hr{border:none;border-top:1px solid var(--border);margin:6px 0;break-after:avoid}
.briefing strong{color:var(--txt)}.briefing em{color:var(--acc)}

/* signal tiers */
.tier{padding:0;border-radius:6px}
.tier h3{font-size:12px;font-weight:600;margin:0;padding:4px 8px;border-radius:4px 4px 0 0}
.core{background:rgba(63,185,80,.04);border:1px solid rgba(63,185,80,.15)}
.core h3{color:var(--grn);background:var(--grn-bg)}
.swing{background:rgba(121,192,255,.04);border:1px solid rgba(121,192,255,.12)}
.swing h3{color:var(--acc);background:rgba(121,192,255,.06)}
.avoid{background:rgba(248,81,73,.04);border:1px solid rgba(248,81,73,.12)}
.avoid h3{color:var(--red);background:var(--red-bg)}
.tier>div{padding:4px 6px}

/* sig rows */
.srow{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;font-size:12px;border-bottom:1px solid rgba(30,42,54,.3);cursor:pointer}
.srow:hover{background:var(--surface)}.srow .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px}
.srow .sc{font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0;margin-left:8px}

/* ta cards */
.tac{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.tac>div{flex:1;min-width:90px;padding:10px;border-radius:8px;border:1px solid var(--border);text-align:center}
.tac .n{font-size:20px;font-weight:700}.tac .l{font-size:10px;color:var(--txt3);margin-top:2px}
.tac .buy{background:#13251a;border-color:#2f5e42}.tac .sell{background:#2a1717;border-color:#5e2f2f}.tac .info{background:var(--surface)}

/* sheet */
.sheet{position:fixed;inset:0;z-index:40;display:none}
.sheet.on{display:block}.sheet_bg{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.sheet_box{position:absolute;right:0;top:0;bottom:0;width:380px;background:var(--card);
  border-left:1px solid var(--border);padding:16px;overflow-y:auto}
.sheet_box .x{position:absolute;right:12px;top:12px;font-size:18px;color:var(--txt3);background:none;border:none;cursor:pointer}
.sheet_box .nm{font-size:18px;font-weight:700}.sheet_box .cd{font-size:12px;color:var(--txt3);margin-left:6px}
.sheet_box .big{font-size:28px;font-weight:800;margin:6px 0}

/* gate */
.gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  background:rgba(8,11,15,.92);padding:24px}
.gate .box{width:100%;max-width:320px;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:20px;text-align:center}
.gate h3{margin-bottom:6px;font-size:16px}.gate p{color:var(--txt3);font-size:12px;margin-bottom:14px}
.gate input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--txt);font-size:15px;text-align:center;margin-bottom:10px}
.gate button{width:100%;padding:10px;border:none;border-radius:8px;background:var(--acc);color:#062224;font-size:15px;font-weight:700}
.gate .msg{color:var(--red);font-size:11px;min-height:16px;margin-top:6px}

.search{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--txt);font-size:14px;margin-bottom:8px;outline:none}
.search:focus{border-color:var(--acc)}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">KrupstockSys</div>
  <div class="topbar-mid">
    <span id="tb_hs">沪深300 —</span><span id="tb_pos">特变 —</span>
  </div>
  <div class="topbar-right"><span id="clk">—</span></div>
</div>
<div class="side" id="side">
  <div class="item on" data-v="flow">📊 持仓</div>
  <div class="item" data-v="strategy">🎯 策略</div>
  <div class="item" data-v="briefing">📰 简报</div>
  <div class="item" data-v="sig">📡 雷达</div>
  <div class="item" data-v="model">🧠 模型</div>
  <div class="item" data-v="perf">🏆 绩效</div>
</div>
<div class="main">

<div class="view" id="v_strategy">
  <div class="info" id="strategy_ipo">加载中…</div>
  <div class="grid2">
    <div class="card"><h2>📈 关键位</h2><div id="strategy_levels"></div></div>
    <div class="card"><h2>📋 周一计划</h2><div id="strategy_plan"></div></div>
  </div>
  <div class="card"><h2>🛡️ 风控</h2><div id="strategy_risk"></div></div>
  <div class="card"><h2>📊 V21 信号</h2><div id="strategy_signal"></div></div>
</div>

<div class="view on" id="v_flow">
  <div class="tac" id="flow_holdings"></div>
  <div id="flow_positions"></div>
  <div class="card"><h2>💰 特变电工 资金流向</h2><div id="flow_sh089" class="pr"></div></div>
  <div class="grid2">
    <div class="card"><h2>主力 vs 散户</h2><div id="flow_main_vs" class="pr"></div></div>
    <div class="card"><h2>5日趋势</h2><div id="flow_trend" class="pr"></div></div>
  </div>
  <div class="card"><h2>🏦 融资融券</h2><div id="flow_margin" class="pr"></div></div>
  <div class="card"><h2>🏭 板块资金</h2><div id="flow_sector" class="pr"></div></div>
</div>

<div class="view" id="v_sig">
  <input class="search" id="q" placeholder="搜索代码/名称…">
  <div class="grid3">
    <div class="tier core"><h3>主仓<span class="cnt" id="c_core"></span></h3><div id="core"></div></div>
    <div class="tier swing"><h3>波段<span class="cnt" id="c_swing"></span></h3><div id="swing"></div></div>
    <div class="tier avoid"><h3>回避<span class="cnt" id="c_avoid"></span></h3><div id="avoid"></div></div>
  </div>
</div>

<div class="view" id="v_briefing">
  <div id="brief_content" class="briefing"></div>
</div>

<div class="view" id="v_model">
  <div class="card" id="train_card"><div class="empty">加载中…</div></div>
  <div class="card" id="model_card"><div class="empty">加载中…</div></div>
</div>

<div class="view" id="v_perf">
  <div class="card"><h2>🏆 纯多头绩效</h2><div id="perf"></div></div>
</div>

</div><!-- main -->

<div class="sheet" id="sheet">
  <div class="sheet_bg" id="sheet_bg"></div>
  <div class="sheet_box">
    <button class="x" id="d_close">✕</button>
    <div class="nm" id="d_name">—</div>
    <div class="cd" id="d_code"></div>
    <div class="big" id="d_score">—</div>
    <div>现价 <b id="d_pr">—</b> &nbsp; 涨跌 <b id="d_ch">—</b></div>
    <div id="d_ctx" class="note"></div>
    <div class="note">同层相邻：</div>
    <div id="d_neighbors"></div>
  </div>
</div>

<div class="gate" id="gate">
  <div class="box">
    <h3>🔒 私有看板</h3><p>请输入访问密码</p>
    <input id="gate_inp" type="password" placeholder="密码" autocomplete="off">
    <button id="gate_btn">解锁</button>
    <div class="msg" id="gate_msg"></div>
  </div>
</div>

<script>
var INIT=null;
var RT={};
var $=s=>document.querySelector(s);

function show(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.toggle('on',e.id==='v_'+v));
  document.querySelectorAll('.side .item').forEach(e=>e.classList.toggle('on',e.dataset.v===v));
}
document.addEventListener('click',e=>{var t=e.target.closest('[data-v]');if(t)show(t.dataset.v);});

// gate
if(localStorage.getItem('krup_v2_unlocked')){$('#gate').style.display='none';}else{
  $('#gate_btn').onclick=function(){
    var pw=$('#gate_inp').value;
    if(pw==='843812'){localStorage.setItem('krup_v2_unlocked','1');$('#gate').style.display='none';$('#gate_msg').textContent='';}
    else{$('#gate_msg').textContent='密码错误, 请重试';}
  };
  $('#gate_inp').onkeydown=function(e){if(e.key==='Enter')$('#gate_btn').click();};
}

// clock
function tick(){var d=new Date();$('#clk').textContent=d.toLocaleTimeString('zh-CN',{hour12:false});}
setInterval(tick,1000);tick();

// signal
function fmtSc(x){return(x>=0?'+':'')+x.toFixed(3);}
function srowHTML(o){return'<div class="srow" data-code="'+o.code+'"><span class="nm">'+(o.name||o.code)+'</span><span style="font-size:10px;color:var(--txt3);margin-right:auto">'+o.code+'</span><span class="sc">'+fmtSc(o.score)+'</span></div>';}
function paintSignal(s){
  $('#c_core').textContent=s.buy_core.length;
  $('#c_swing').textContent=s.buy_swing.length;
  $('#c_avoid').textContent=s.avoid.length;
  $('#core').innerHTML=s.buy_core.map(srowHTML).join('');
  $('#swing').innerHTML=s.buy_swing.map(srowHTML).join('');
  $('#avoid').innerHTML=s.avoid.map(srowHTML).join('');
}
function loadSignal(){
  if(INIT&&INIT.signal){paintSignal(INIT.signal);return;}
  fetch('/api/signal').then(r=>r.json()).then(j=>{if(j.ok)paintSignal(j.signal);});
}
$('#q').oninput=function(){if(INIT&&INIT.signal)paintSignal(INIT.signal);};

// status/model
function paintStatus(s){
  var t=s.training||{};
  var h='<h2>V21 训练 <span class="cnt">'+(((s.model||{}).champion||{}).name||'Run9')+'</span></h2>';
  if(t.found){h+='<div class="pr"><div class="r"><span class="k">状态</span><span class="v">'+t.state+'</span></div>';
    if(t.epoch)h+='<div class="r"><span class="k">进度</span><span class="v">ep'+t.epoch+'/'+t.total_epochs+'</span></div>';
    h+='<div class="r"><span class="k">规模</span><span class="v">'+(t.total_stocks||'?')+'只 '+(t.params||'')+'参数</span></div>';
    if(t.train_loss!=null)h+='<div class="r"><span class="k">loss</span><span class="v">train '+t.train_loss.toFixed(4)+' val '+(t.val_loss||0).toFixed(4)+'</span></div>';
    if(t.best_val!=null)h+='<div class="r"><span class="k">最佳val</span><span class="v">'+t.best_val.toFixed(4)+'</span></div>';
  }else{h+='<div class="empty">训练日志未找到</div>';}
  h+='</div>';
  $('#train_card').innerHTML=h;
  var m=s.model||{},d=s.data||{};
  var mh='<h2>模型/数据</h2><div class="pr">';
  mh+='<div class="r"><span class="k">股票缓存</span><span class="v">'+d.cache_stocks+'只</span></div>';
  mh+='<div class="r"><span class="k">数据真实性</span><span class="v">'+((d.authenticity||{}).status==='verified_real'?'✅ 已核验':'⚠️ 未核验')+'</span></div>';
  mh+='</div>';
  $('#model_card').innerHTML=mh;
}
function loadStatus(){
  if(INIT&&INIT.status){paintStatus(INIT.status);return;}
  fetch('/api/status').then(r=>r.json()).then(paintStatus);
}

function paintPerf(j){
  var rows=j.rows||[];
  if(!rows.length){$('#perf').innerHTML='<div class="empty">训练完成后自动生成</div>';return;}
  var h='<table style="width:100%;font-size:11px;border-collapse:collapse"><thead><tr><th>分档</th><th>持有</th><th>净年化</th><th>净夏普</th><th>胜率</th></tr></thead><tbody>';
  rows.forEach(r=>{h+='<tr><td>top'+(r.frac*100).toFixed(0)+'%</td><td>'+r.hold+'d</td><td style="color:var(--grn)">'+(r.net_ann*100).toFixed(1)+'%</td><td>'+r.net_sharpe.toFixed(2)+'</td><td>'+(r.win_rate*100).toFixed(0)+'%</td></tr>';});
  h+='</tbody></table>';
  $('#perf').innerHTML=h;
}
function loadPerf(){
  if(INIT&&INIT.perf){paintPerf(INIT.perf);return;}
  fetch('/api/perf').then(r=>r.json()).then(paintPerf);
}

// holdings
function paintHoldings(){
  var ha=INIT&&INIT.holding_analysis, hh=INIT&&INIT.holdings;
  if(!ha||!ha.length){
    $('#holdings_summary').innerHTML='<div class="empty">暂无持仓数据</div>';
    return;
  }
  var tp=0,tv=0;ha.forEach(function(p){tp+=p.pnl_amount;tv+=p.market_value;});
  var ta=hh?hh.total_asset:(tv+1143),cash=hh?hh.cash:1143;
  var r=((tv)/Math.max(ta,1)*100).toFixed(1);
  $('#holdings_summary').innerHTML=
    '<div class="info"><div class="n">¥'+ta.toLocaleString()+'</div><div class="l">总资产</div></div>'+
    '<div class="'+(tp>=0?'buy':'sell')+'"><div class="n">'+(tp>=0?'+':'')+Math.round(tp).toLocaleString()+'</div><div class="l">浮动盈亏</div></div>'+
    '<div class="info"><div class="n">'+r+'%</div><div class="l">仓位</div></div>'+
    '<div class="info"><div class="n">¥'+cash.toFixed(0)+'</div><div class="l">可用</div></div>';
  $('#holdings_list').innerHTML=ha.map(function(p){
    return'<div class="pr"><div class="r '+(p.pnl_pct<0?'sell':'buy')+'" style="border-left-color:'+(p.pnl_pct<0?'var(--red)':'var(--grn)')+'"><span class="k">'+p.name+' <small>'+p.shares.toLocaleString()+'股 @¥'+p.cost.toFixed(2)+'</small></span><span class="v" style="color:'+(p.pnl_pct<0?'var(--red)':'var(--grn)')+'">'+(p.pnl_pct>=0?'+':'')+p.pnl_pct.toFixed(2)+'%</span></div></div>';
  }).join('');
}

// strategy
function paintStrategy(d){
  if(!d)return;
  var ip=d.ipo||{},h=d.holding||{},mp=(d.plan||{}).monday_plan||{};
  var sells=mp.step1_sell||[],stops=mp.risk_rules||[];
  $('#strategy_ipo').innerHTML=ip.name?'<b>'+ip.name+'('+ip.code+')</b> 中签 '+ip.result_date+'公布 | 缴款 '+ip.payment_due+' | '+ip.lots+'签':'暂无IPO';
  var lv='<div class="pr">';
  lv+='<div class="r"><span class="k">现价</span><span class="v" style="color:var(--red)">¥'+(h.price||'18.66')+'</span></div>';
  lv+='<div class="r"><span class="k">成本</span><span class="v">¥'+(h.cost||'21.46')+'</span></div>';
  lv+='<div class="r"><span class="k">止损</span><span class="v" style="color:var(--red)">¥18.50</span></div>';
  lv+='<div class="r"><span class="k">压力/支撑</span><span class="v">19.42 / 18.61</span></div></div>';
  $('#strategy_levels').innerHTML=lv;
  var pl='<div class="pr">';
  sells.forEach(function(b,i){pl+='<div class="r"><span class="k">第'+(i+1)+'批</span><span class="v">'+b.shares.toLocaleString()+'股 @¥'+b.price+'</span></div>';});
  pl+='<div class="r"><span class="k">T+1波段</span><span class="v" style="color:var(--amber)">暂停(等止跌)</span></div>';
  pl+='<div class="r"><span class="k">T+0底仓</span><span class="v">10,400股</span></div></div>';
  $('#strategy_plan').innerHTML=pl;
  var rk='<div class="pr">';
  stops.forEach(function(s){rk+='<div class="r" style="border-left-color:var(--red)"><span class="k">'+s+'</span></div>';});
  rk+='</div>';$('#strategy_risk').innerHTML=rk;
  var st=INIT&&INIT.status,sh=st&&st.SH600089||{};
  $('#strategy_signal').innerHTML='<div class="pr"><div class="r"><span class="k">V21排名</span><span class="v">#'+(sh.rank||'?')+'/'+(sh.total||'?')+'</span></div><div class="r"><span class="k">综合评分</span><span class="v">'+(sh.combined_score||'?')+'</span></div><div class="r"><span class="k">研判</span><span class="v" style="font-size:11px">'+(sh.assessment||'—')+'</span></div></div>';
  $('#tb_hs').textContent='沪深300 3764';
  $('#tb_pos').innerHTML='特变 <span style="color:var(--red)">¥'+(h.price||'18.66')+'</span>';
}
function loadStrategy(){
  if(INIT&&INIT.strategy){paintStrategy(INIT.strategy);return;}
  fetch('/api/strategy').then(function(r){return r.json();}).then(paintStrategy).catch(function(){});
}

// flow (includes holdings summary)
function loadFlow(){
  // holdings summary
  var ha=INIT&&INIT.holding_analysis, hh=INIT&&INIT.holdings;
  if(ha&&ha.length){
    var tp=0,tv=0;ha.forEach(function(p){tp+=p.pnl_amount;tv+=p.market_value;});
    var ta=hh?hh.total_asset:(tv+1143),cash=hh?hh.cash:1143;
    var r=((tv)/Math.max(ta,1)*100).toFixed(1);
    $('#flow_holdings').innerHTML=

// briefing
function renderMD(md){
  if(!md)return'';
  var h=md;
  h=h.replace(/^\|(.+)\|$/gm,function(m){
    if(m.indexOf('---')>=0)return'</tbody></table>';
    var cells=m.split('|').filter(function(c){return c.trim();});
    return'<tr>'+cells.map(function(c){var t=c.trim();if(t.indexOf('**')===0&&t.lastIndexOf('**')===t.length-2)return'<td><b>'+t.slice(2,-2)+'</b></td>';return'<td>'+t+'</td>';}).join('')+'</tr>';
  });
  h=h.replace(/(<tr>.*?<\/tr>\n?)+/g,'<table>$&</table>');
  h=h.replace(/<tr>---<\/tr>/g,'');
  h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  h=h.replace(/^---$/gm,'<hr>');
  h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
  h=h.replace(/((?:<li>.*?<\/li>\n?)+)/g,'<ul>$1</ul>');
  h=h.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank">$1</a>');
  h=h.replace(/\n\n/g,'<br>');
  return h;
}
function paintBriefing(b){
  if(!b)return;
  var md=b.full_md||b.title||'';
  // split into title + sections
  var parts=md.split(/\n## /);
  var title=renderMD(parts[0]);
  var sections=parts.slice(1).map(function(s){return renderMD('## '+s);});
  var h='<div class="card" style="margin-bottom:6px">'+title+'</div>';
  if(sections.length){
    h+='<div class="grid2">';
    sections.forEach(function(s){h+='<div class="card">'+s+'</div>';});
    h+='</div>';
  }
  $('#brief_content').innerHTML=h;
}

// sheet
function openStock(code){
  var sig=INIT&&INIT.signal;if(!sig)return;
  var tmap={buy_core:'主仓',buy_swing:'波段',avoid:'回避'};var tier='',entry=null,list=[];
  for(var k in tmap){list=sig[k]||[];for(var i=0;i<list.length;i++){if(list[i].code===code){tier=tmap[k];entry=list[i];break;}}if(entry)break;}
  if(!entry)return;
  var sorted=list.slice().sort(function(a,b){return b.score-a.score;});
  var rank=sorted.findIndex(function(o){return o.code===code;})+1;
  $('#d_name').textContent=entry.name||entry.code;
  $('#d_code').textContent=entry.code;
  $('#d_score').textContent=fmtSc(entry.score);
  $('#d_score').style.color=entry.score>=0?'var(--grn)':'var(--red)';
  var pr=$('#d_pr');pr.setAttribute('data-code',entry.code);
  var ch=$('#d_ch');
  if(RT[entry.code]){pr.textContent=RT[entry.code].pr;ch.textContent=RT[entry.code].ch;}
  var idx=sorted.findIndex(function(o){return o.code===code;});
  var nb=sorted.slice(Math.max(0,idx-2),idx+3);
  $('#d_neighbors').innerHTML=nb.map(function(o){
    return'<div class="srow"'+(o.code===code?' style="outline:1px solid var(--acc)"':'')+'><span class="nm">'+(o.name||o.code)+'</span><span class="sc">'+fmtSc(o.score)+'</span></div>';
  }).join('');
  $('#d_ctx').innerHTML=entry.reg_20d!=null?'<div class="pr"><div class="r"><span class="k">20日预测</span><span class="v">'+(entry.reg_20d*100).toFixed(1)+'%</span></div></div>':'';
  $('#sheet').classList.add('on');
}
document.getElementById('d_close').onclick=function(){$('#sheet').classList.remove('on');};
document.getElementById('sheet_bg').onclick=function(){$('#sheet').classList.remove('on');};
document.addEventListener('click',function(e){
  var t=e.target.closest('.srow');if(!t)return;
  var code=t.getAttribute('data-code');if(code)openStock(code);
});

// realtime (only update price b elements, not signal rows)
function fetchRT(){
  var els=document.querySelectorAll('#d_pr[data-code]');
  var codes=Array.from(new Set(Array.from(els).map(function(el){return el.getAttribute('data-code');})));
  if(!codes.length)return;
  for(var i=0;i<codes.length;i+=80){
    var batch=codes.slice(i,i+80).map(function(c){return(c.startsWith('SH')?'sh':'sz')+c.slice(2);}).join(',');
    (function(batchCodes){
      fetch('https://qt.gtimg.cn/q='+batch).then(function(r){return r.text();}).then(function(txt){
        var lines=txt.split('\n');
        lines.forEach(function(line){
          var m=line.match(/v_([a-z0-9]+)="(.+)";?/);if(!m)return;
          var rc=m[1],fc=(rc.startsWith('sh')?'SH':'SZ')+rc.slice(2).toUpperCase();
          var vs=m[2].split('~');
          var pr=parseFloat(vs[3]),ch=parseFloat(vs[32])||0;
          RT[fc]={pr:pr?pr.toFixed(2):'—',ch:ch?((ch>0?'+':'')+ch.toFixed(2)+'%'):'—'};
        });
        // only update designated price elements
        document.querySelectorAll('#d_pr[data-code]').forEach(function(el){
          var c=el.getAttribute('data-code');if(RT[c])el.textContent=RT[c].pr;
        });
      }).catch(function(){});
    })(batch);
  }
}
setInterval(fetchRT,30000);fetchRT();

function tryInit(d){
  INIT=d;
  if(d.status)paintStatus(d.status);
  if(d.signal)paintSignal(d.signal);
  if(d.perf)paintPerf(d.perf);
  if(d.briefing)paintBriefing(d.briefing);
  if(d.strategy)paintStrategy(d.strategy);
  if(d.holding_analysis||d.holdings)paintHoldings();
  loadFlow();
}

});
